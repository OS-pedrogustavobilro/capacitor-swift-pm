name: Build and Release

on:
  workflow_call:
    inputs:
      release-version:
        required: true
        type: string
      draft-flag:
        type: string
        default: " "
      capacitor-ref:
        type: string
        default: ""
        description: "Git ref (branch or tag) to check out in the capacitor repo. Defaults to release-version."
    secrets:
      XCFRAMEWORK_SIGNING_TOKEN:
        required: false

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      XCFRAMEWORK_SIGNING_TOKEN: ${{ secrets.XCFRAMEWORK_SIGNING_TOKEN }}
    steps:
      - run: |
          if [[ "${{ inputs.release-version }}" =~ ^7\. ]]; then
            sudo xcode-select --switch /Applications/Xcode_16.2.app
          else
            sudo xcode-select --switch /Applications/Xcode_26.0.app
          fi
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ghr
      - name: Build Capacitor and Cordova
        run: ./build-cap ${{ inputs.release-version }} ${{ inputs.capacitor-ref }}
      - name: Sign Capacitor xcframework
        if: env.XCFRAMEWORK_SIGNING_TOKEN != ''
        uses: ionic-team/sign-xcframework@main
        with:
          cert-token: ${{ secrets.XCFRAMEWORK_SIGNING_TOKEN }}
          xcframework-path: Capacitor.xcframework
      - name: Sign Cordova xcframework
        if: env.XCFRAMEWORK_SIGNING_TOKEN != ''
        uses: ionic-team/sign-xcframework@main
        with:
          cert-token: ${{ secrets.XCFRAMEWORK_SIGNING_TOKEN }}
          xcframework-path: Cordova.xcframework
      - name: Package Capacitor and Cordova
        run: ./package-cap ${{ inputs.release-version }}
      - name: Push manifest update
        uses: EndBug/add-and-commit@v9
      - name: Create Release
        run: ghr -token ${{ secrets.GITHUB_TOKEN }} -name ${{ inputs.release-version }} ${{ inputs.draft-flag }} -replace ${{ inputs.release-version }} frameworks
