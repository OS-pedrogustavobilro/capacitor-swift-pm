name: Dispatch Release

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: The version to release
        required: true
        type: string
      draft-flag:
        description: "Create a Draft Release or Immediately Release"
        type: string
        default: " "
      capacitor-ref:
        description: "Git ref (branch or tag) to check out in the capacitor repo. Leave empty to use release-version as the tag."
        type: string
        default: ""

jobs:
  create-release:
    permissions:
      contents: write
    uses: ./.github/workflows/build-and-release.yaml
    with:
      release-version: ${{ inputs.release-version }}
      draft-flag: ${{ inputs.draft-flag }}
      capacitor-ref: ${{ inputs.capacitor-ref }}
    secrets: inherit
